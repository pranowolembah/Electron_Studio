name: Build Windows Installer

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Python & Build Tools
        run: |
          npm install --global node-gyp

      - name: Install GTK/Cairo Dependencies for Canvas
        shell: powershell
        run: |
          # Membuat folder target C:\GTK untuk pustaka canvas sesuai standar node-canvas Windows
          New-Item -ItemType Directory -Force -Path C:\GTK
          # Mengunduh paket biner GTK resmi yang dibutuhkan oleh node-canvas
          Invoke-WebRequest -Uri "https://github.com" -OutFile gtk.zip
          Expand-Archive -Path gtk.zip -DestinationPath C:\GTK -Force
          Remove-Item gtk.zip
          # Menambahkan binary GTK ke sistem PATH agar bisa dibaca oleh compiler
          echo "C:\GTK\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Download FFmpeg Static Build
        shell: bash
        run: |
          mkdir -p resources/ffmpeg
          curl -L -o ffmpeg.zip https://gyan.dev
          powershell Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extracted
          find ffmpeg_extracted -name "ffmpeg.exe" -exec cp {} resources/ffmpeg/ \;
          rm -rf ffmpeg.zip ffmpeg_extracted

      - name: Install Dependencies
        run: npm install --ignore-scripts

      - name: Rebuild Native Modules (Canvas)
        shell: powershell
        # Membantu node-gyp menemukan lokasi folder GTK/Cairo saat melakukan kompilasi ulang
        env:
          GTK_Root: C:\GTK
        run: npm run rebuild

      - name: Download Google Fonts
        run: npm run download-fonts
        continue-on-error: true

      - name: Build Windows Installer (.exe)
        run: npm run dist:win

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Music-Render-Studio-Installer
          path: dist/*.exe
          if-no-files-found: error
